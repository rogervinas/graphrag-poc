name: Makefile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-makefile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Test make help
        run: make help

      - name: Test make generate
        run: make generate

      - name: Test make clean
        run: make clean
